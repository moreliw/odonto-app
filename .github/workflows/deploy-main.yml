name: Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /opt/odonto-app
      # GitHub → Settings → Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, etc.
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${SSH_PORT:-22}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Build deploy env file
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MASTER_DB_HOST: ${{ secrets.MASTER_DB_HOST }}
          MASTER_DB_PORT: ${{ secrets.MASTER_DB_PORT }}
        run: |
          MASTER_DB_HOST="${MASTER_DB_HOST:-postgres-master}"
          MASTER_DB_PORT="${MASTER_DB_PORT:-5432}"
          ENCODED_PG_USER="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_USER"]))')"
          ENCODED_PG_PASS="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_PASSWORD"]))')"
          MASTER_DATABASE_URL="postgresql://${ENCODED_PG_USER}:${ENCODED_PG_PASS}@${MASTER_DB_HOST}:${MASTER_DB_PORT}/master?schema=public"
          cat > .deploy.env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          MASTER_DATABASE_URL=${MASTER_DATABASE_URL}
          MASTER_ADMIN_TOKEN=${{ secrets.MASTER_ADMIN_TOKEN }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          LOG_TO_FILE=${{ secrets.LOG_TO_FILE }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          DEV_TENANT_SUBDOMAIN=${{ secrets.DEV_TENANT_SUBDOMAIN }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          PUBLIC_DOMAIN=${{ secrets.PUBLIC_DOMAIN }}
          PUBLIC_WILDCARD=${{ secrets.PUBLIC_WILDCARD }}
          PUBLIC_APP_URL=${{ secrets.PUBLIC_APP_URL }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_BASIC_MONTHLY=${{ secrets.STRIPE_PRICE_BASIC_MONTHLY }}
          STRIPE_PRICE_PRO_MONTHLY=${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          MASTER_SUPERADMIN_EMAIL=${{ secrets.MASTER_SUPERADMIN_EMAIL }}
          MASTER_SUPERADMIN_PASSWORD=${{ secrets.MASTER_SUPERADMIN_PASSWORD }}
          SEED_CLINIC_NAME=${{ secrets.SEED_CLINIC_NAME }}
          SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
          MINIO_API_PORT=${{ secrets.MINIO_API_PORT }}
          MINIO_CONSOLE_PORT=${{ secrets.MINIO_CONSOLE_PORT }}
          APP_HTTP_PORT=${{ secrets.APP_HTTP_PORT }}
          EOF
          sed -i 's/^[[:space:]]*//' .deploy.env

      - name: Sync project files
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "backend/node_modules" \
            --exclude "frontend/node_modules" \
            --exclude "backend/dist" \
            --exclude "frontend/.angular" \
            --exclude "data" \
            --exclude ".deploy.env" \
            -e "ssh -p ${SSH_PORT:-22}" \
            ./ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Upload environment file
        run: |
          scp -P "${SSH_PORT:-22}" .deploy.env "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/.deploy.env"

      - name: Deploy on server
        run: |
          ssh -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /opt/odonto-app
          mv .deploy.env .env
          POSTGRES_USER="$(grep '^POSTGRES_USER=' .env | cut -d '=' -f2-)"
          POSTGRES_PASSWORD="$(grep '^POSTGRES_PASSWORD=' .env | cut -d '=' -f2-)"
          mkdir -p data/postgres data/redis data/minio data/logs
          docker compose up -d --build --remove-orphans
          if docker compose exec -T -e APP_DB_USER="${POSTGRES_USER}" -e PGPASSWORD="${POSTGRES_PASSWORD}" postgres-master sh -lc 'psql -h localhost -U "$APP_DB_USER" -d master -c "\q"' >/dev/null 2>&1; then
            echo "Credenciais de banco válidas para ${POSTGRES_USER}"
          elif docker compose exec -T -e PGPASSWORD="postgres" postgres-master sh -lc 'psql -h localhost -U postgres -d master -c "\q"' >/dev/null 2>&1; then
            echo "Fallback para credenciais padrão postgres/postgres"
            POSTGRES_USER="postgres"
            POSTGRES_PASSWORD="postgres"
            sed -i "s|^POSTGRES_USER=.*|POSTGRES_USER=${POSTGRES_USER}|g" .env
            sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|g" .env
          else
            echo "Falha ao autenticar no banco master com as credenciais fornecidas e fallback padrão"
            exit 1
          fi
          ENCODED_MASTER_USER="$(MASTER_DB_USER="${POSTGRES_USER}" python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["MASTER_DB_USER"]))')"
          ENCODED_MASTER_PASS="$(MASTER_DB_PASS="${POSTGRES_PASSWORD}" python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["MASTER_DB_PASS"]))')"
          MASTER_DATABASE_URL="postgresql://${ENCODED_MASTER_USER}:${ENCODED_MASTER_PASS}@postgres-master:5432/master?schema=public"
          sed -i "s|^MASTER_DATABASE_URL=.*|MASTER_DATABASE_URL=${MASTER_DATABASE_URL}|g" .env
          docker compose exec -T -e MASTER_DATABASE_URL="${MASTER_DATABASE_URL}" app-backend npx prisma db push --schema=prisma/master.schema.prisma
          TENANTS=$(docker compose exec -T postgres-master psql -U postgres -d master -At -F "|" -c "select \"dbUser\",\"dbPassword\",\"dbHost\",\"dbPort\",\"dbName\" from \"Tenant\";" || true)
          if [ -n "${TENANTS}" ]; then
            while IFS="|" read -r dbUser dbPassword dbHost dbPort dbName; do
              if [ -z "${dbName}" ]; then
                continue
              fi
              ENCODED_TENANT_USER="$(TENANT_DB_USER="${dbUser}" python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["TENANT_DB_USER"]))')"
              ENCODED_TENANT_PASS="$(TENANT_DB_PASS="${dbPassword}" python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["TENANT_DB_PASS"]))')"
              docker compose exec -T -e TENANT_DATABASE_URL="postgresql://${ENCODED_TENANT_USER}:${ENCODED_TENANT_PASS}@${dbHost}:${dbPort}/${dbName}?schema=public" app-backend npx prisma db push --schema=prisma/tenant.schema.prisma || true
            done <<< "${TENANTS}"
          fi
          docker compose ps
          REMOTE
